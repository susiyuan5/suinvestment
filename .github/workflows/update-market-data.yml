name: Update weekly market data

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-weekly-market-data
  cancel-in-progress: true

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update market data
        run: python scripts/price_sources.py
      - name: Validate price source tests
        run: python -m unittest tests.test_price_sources
      - name: Commit market data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly market data"
          file_pattern: data/market-data.json results/data_freshness/market_price_freshness.json
